<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefa V JS - Index</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <div class="tudoprr">
        <div class="cabecario">
            <header>
                <h1>Tarefa V de JS</h1>
                <h4>Trabalho N° 12 | Senac desenvolvedor Web</h4>
            </header>
            <nav>
            </nav>
        </div>
        <div class="resto">
            <main>
                <div class="sces">
                    <h3>Sistema de Controle de Estoque Simples</h3>
                    <div class="ninfo">
                        <label for="name">Nome do produto</label>
                        <input type="text" id="produto" autofocus>
                    </div>
                    <div class="ninfo">
                        <label for="cat">Categoria</label>
                        <input type="number" id="cat">
                    </div>
                    <div class="ninfo">
                        <label for="preco">Preço</label>
                        <input type="number" id="preco">
                    </div>
                    <div class="ninfo">
                        <label for="quantidade">Quantidade em estoque</label>
                        <input type="number" id="quantidade">
                    </div>  
                    <div class="btn-cadastro">
                        <button onclick="cadastro()" class="btncds">Cadastrar produto</button>
                    </div>
                    <p id="demo" class="demo"></p>
                </div>
                <div class="list">
                    <h2>Lista de produtos</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Categoria</th>
                                <th>Preço</th>
                                <th>Qnt. Estoque</th>
                            </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                    <h3>Estatísticas gerais</h3>
                    <p id="totalProduto" class="qntd">Quantidade de produtos cadastrados: 0</p>
                    <p id="totalUnidade" class="qntd">Total das unidades: R$0.00</p>
                    <p id="totalEstoque" class="qntd">Total de preço do estoque: R$0.00</p>
                    <p id="barato" class="qntd"></p>
                    <button id="close" onclick="exclude()" class="btn-exclude">Excluir</button>
                </div>
                <div class="pesq">
                    <div>
                        <input type="text" id="pesquisarInput" placeholder="Pesquisar:">
                        <button id="pesquisaButton" onclick="pesquisar()" class="btn-pesquisa">Pesquisar</button>
                        <button id="baixoestoqueButton" onclick="baixo()" class="btn-baixo">Itens com menor estoque</button>
                    </div>
                </div>
            </main>
            <footer>
        
            </footer>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
